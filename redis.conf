# Разрешаем подключения со всех интерфейсов
bind 0.0.0.0

# Пароль (можно убрать для экспериментов)
# requirepass your_password

# Persistence
appendonly yes
appendfilename "appendonly.aof"
save 900 1
save 300 10
save 60 10000

# Максимальная память
maxmemory 512mb
maxmemory-policy allkeys-lru

# Логирование
loglevel notice

# Отключаем protected mode
protected-mode no